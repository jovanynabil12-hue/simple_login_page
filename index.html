<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Old Square Switch Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page" id="page">

    <div class="lamp-zone">
      <div class="lamp-glow" id="lampGlow"></div>
      <div class="lamp-beam" id="lampBeam"></div>

      <div class="lamp" id="lamp">
        <div class="lamp-cap"></div>
        <div class="lamp-head">
          <div class="lamp-shine"></div>
          <div class="lamp-inner-light" id="lampInnerLight"></div>
        </div>
      </div>
    </div>

    <div class="switch-area">
      <button class="old-switch" id="oldSwitch" aria-label="Toggle Lamp">
        <span class="switch-plate"></span>
        <span class="switch-hole top-hole"></span>
        <span class="switch-hole bottom-hole"></span>
        <span class="switch-rocker" id="switchRocker"></span>
      </button>
    </div>

    <div class="login-wrap hidden" id="loginWrap">
      <div class="login-card">
        <div class="card-light" id="cardLight"></div>

        <h1>Login</h1>
        <p>Welcome back</p>

        <form>
          <div class="input-box">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 12a4 4 0 1 0 0-8a4 4 0 0 0 0 8Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M4 20a8 8 0 0 1 16 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <input type="text" placeholder="Enter your username" />
          </div>

          <div class="input-box password-box">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M7 10V8a5 5 0 1 1 10 0v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <rect x="4" y="10" width="16" height="10" rx="2.5" stroke="currentColor" stroke-width="1.8"/>
                <path d="M12 14v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </span>

            <input type="password" id="passwordInput" placeholder="Password" />

            <button type="button" class="toggle-password" id="togglePassword" aria-label="Show password">
              <svg id="eyeOpen" viewBox="0 0 24 24" fill="none">
                <path d="M2 12s3.5-6 10-6s10 6 10 6s-3.5 6-10 6S2 12 2 12Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
              </svg>

              <svg id="eyeClosed" viewBox="0 0 24 24" fill="none" class="hidden-eye">
                <path d="M3 3l18 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M10.6 10.7a2.9 2.9 0 0 0 2.7 2.7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M9.9 5.1A10.9 10.9 0 0 1 12 5c6.5 0 10 7 10 7a16.7 16.7 0 0 1-3.2 4.1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M6.2 6.2A16.7 16.7 0 0 0 2 12s3.5 7 10 7a10.7 10.7 0 0 0 5.1-1.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>

          <button type="submit" class="submit-btn">Sign In</button>
        </form>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
